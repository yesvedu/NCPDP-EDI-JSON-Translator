<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NCPDP Translator - History</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#111412;
color:white;
}

nav{
background:#1a1f1d;
color:white;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #4CAF50;
}

nav h2{
font-size:24px;
color:#4CAF50;
}

.container{
width:90%;
max-width:1200px;
margin:40px auto;
}

.card{
background:#1a1f1d;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,.3);
}

h1{
text-align:center;
color:#4CAF50;
margin-bottom:30px;
}

.search-box{
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:12px;
background:#111412;
color:white;
border:1px solid #4CAF50;
border-radius:10px;
font-size:16px;
outline:none;
}

.search-box input::placeholder{
color:#bdbdbd;
}

.search-box input:focus{
border-color:#4CAF50;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#4CAF50;
color:white;
padding:14px;
}

td{
padding:14px;
text-align:center;
border-bottom:1px solid #333;
color:white;
}

tr:hover{
background:#222826;
}

.buttons{
margin-top:30px;
display:flex;
justify-content:center;
gap:15px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
background:#4CAF50;
color:white;
font-size:15px;
transition:.3s;
}

button:hover{
background:#43a047;
}

</style>

</head>

<body>

<nav>

<h2>NCPDP Translator</h2>

</nav>

<div class="container">

<div class="card">

<h1>Translation History</h1>

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search by file name..."
>

</div>

<table>

<thead>

<tr>

<th>File Name</th>

<th>Date</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="historyTable">

<tr>

<td colspan="4">

No History Available

</td>

</tr>

</tbody>

</table>

<div class="buttons">

<button onclick="location.href='translator.html'">

Upload New File

</button>

<button onclick="location.href='result.html'">

Back

</button>

</div>

</div>

</div>

<script src="js/history.js"></script>

</body>

</html>
