<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCPDP Translator - Login</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#111412;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:380px;
            background:#1a1f1d;
            border-radius:10px;
            padding:40px;
            box-shadow:0 10px 30px rgba(0,0,0,.3);
        }

        h1{
            text-align:center;
            color:#4CAF50;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:white;
            margin-bottom:30px;
        }

        label{
            font-weight:bold;
            color:white;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:20px;
            background:#111412;
            color:white;
            border:1px solid #4CAF50;
            border-radius:10px;
            font-size:15px;
            outline:none;
        }

        input::placeholder{
            color:#bdbdbd;
        }

        input:focus{
            border-color:#4CAF50;
        }

        button{
            width:100%;
            padding:13px;
            background:#4CAF50;
            color:white;
            border:none;
            border-radius:10px;
            font-size:17px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#43a047;
        }

        #error{
            color:#ff5252;
            text-align:center;
            margin-top:15px;
        }

        .footer{
            margin-top:25px;
            text-align:center;
            color:white;
            font-size:13px;
        }
    </style>

</head>

<body>

<div class="login-box">

    <h1>NCPDP Translator</h1>

    <p>Secure Login Portal</p>

    <form id="loginForm">

        <label>Username</label>

        <input
            type="text"
            id="username"
            placeholder="Enter Username"
            required
        >

        <label>Password</label>

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required
        >

        <button type="submit">
            Login
        </button>

        <div id="error"></div>

    </form>

    <div class="footer">
        © 2026 NCPDP Translator
    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
