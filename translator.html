<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCPDP Translator</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#111412;
            color:white;
        }

        nav{
            background:#1a1f1d;
            color:white;
            padding:18px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-bottom:2px solid #4CAF50;
        }

        nav h2{
            font-size:24px;
            color:#4CAF50;
        }

        nav button{
            padding:10px 18px;
            border:none;
            border-radius:10px;
            background:#4CAF50;
            color:white;
            cursor:pointer;
            font-weight:bold;
            transition:.3s;
        }

        nav button:hover{
            background:#43a047;
        }

        .container{
            width:80%;
            max-width:800px;
            margin:50px auto;
        }

        .card{
            background:#1a1f1d;
            padding:35px;
            border-radius:10px;
            box-shadow:0 5px 20px rgba(0,0,0,.3);
        }

        h1{
            text-align:center;
            color:#4CAF50;
            margin-bottom:25px;
        }

        .drop-area{
            border:3px dashed #4CAF50;
            border-radius:10px;
            padding:50px;
            text-align:center;
            color:white;
            margin-bottom:20px;
            background:#111412;
        }

        input[type=file]{
            margin-top:20px;
            color:white;
        }

        button.translate{
            width:100%;
            margin-top:25px;
            padding:15px;
            background:#4CAF50;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
            transition:.3s;
        }

        button.translate:hover{
            background:#43a047;
        }

        progress{
            width:100%;
            height:20px;
            margin-top:20px;
            display:none;
            accent-color:#4CAF50;
        }

        #message{
            margin-top:20px;
            text-align:center;
            font-weight:bold;
            color:#4CAF50;
        }
    </style>

</head>

<body>

<nav>

    <h2>NCPDP Translator</h2>

    <button onclick="logout()">
        Logout
    </button>

</nav>

<div class="container">

<div class="card">

<h1>Upload EDI File</h1>

<div class="drop-area">

    <p>Drag & Drop your .EDI file here</p>

    <p>OR</p>

    <input
        type="file"
        id="ediFile"
        accept=".edi,.txt"
    >

</div>

<button class="translate" id="translateBtn">

    Translate File

</button>

<progress id="progressBar" value="0" max="100"></progress>

<div id="message"></div>

</div>

</div>

<script src="js/translator.js"></script>

</body>
</html>
